# Publish to npm via Trusted Publishing (OIDC)
#
# No NPM_TOKEN needed — npm verifies this workflow cryptographically
# via OpenID Connect. Provenance attestations are automatic.
#
# Every merge to main auto-bumps the patch version if no manual bump
# was made, then publishes, tags, and creates a GitHub Release.

name: Publish to npm

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      # GitHub runners ship outdated npm — OIDC trusted publishing needs npm >= 11.5.1
      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test --run

      - name: Type check
        run: pnpm typecheck

      - name: Bump version if needed
        id: version
        run: |
          LOCAL=$(node -e "import fs from 'fs'; const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf-8')); process.stdout.write(pkg.version);" --input-type=module)
          REMOTE=$(npm view joycraft version 2>/dev/null || echo "0.0.0")
          if [ "$LOCAL" = "$REMOTE" ]; then
            echo "Version unchanged ($LOCAL), auto-bumping patch..."
            npm version patch --no-git-tag-version
            LOCAL=$(node -e "import fs from 'fs'; const pkg = JSON.parse(fs.readFileSync('./package.json', 'utf-8')); process.stdout.write(pkg.version);" --input-type=module)
            echo "bumped=true" >> "$GITHUB_OUTPUT"
          else
            echo "Version already bumped: $REMOTE -> $LOCAL"
            echo "bumped=false" >> "$GITHUB_OUTPUT"
          fi
          echo "version=$LOCAL" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        if: steps.version.outputs.bumped == 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/maksutovic/joycraft.git"
          git add package.json
          git commit -m "release: v$VERSION [skip ci]"
          git push origin main

      - name: Publish to npm
        run: npm publish --access public

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${RELEASE_TOKEN}@github.com/maksutovic/joycraft.git"
          git tag -a "v$VERSION" -m "v$VERSION"
          git push origin "v$VERSION"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --latest
